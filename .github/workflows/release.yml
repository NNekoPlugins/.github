name: Org Release - Tag Build

on:
  workflow_call:

jobs:
  release:
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if (-not $ref.StartsWith("v")) {
            Write-Error "Release workflow must be run on a tag starting with 'v'"
          }
          $ver = $ref.Substring(1)
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build --configuration Release /p:GitVersion=${{ steps.version.outputs.version }}

      - name: Package plugin
        shell: pwsh
        run: |
          $out = "package"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          # Copy plugin files
          Get-ChildItem -Recurse -Include *.dll,*.json,*.png,*.ico,CHANGELOG.md |
            Copy-Item -Destination $out -Force

          # Create ZIP
          Compress-Archive -Path "$out\*" -DestinationPath "${{ github.event.repository.name }}-${{ steps.version.outputs.version }}.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-release-${{ steps.version.outputs.version }}
          path: |
            ${{ github.event.repository.name }}-${{ steps.version.outputs.version }}.zip
            package/**
