name: NNekoPlugins Plugin Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install DalamudPackager
      run: dotnet tool install --global DalamudPackager

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Package
      run: |
        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
        dalamudpackager pack -o artifacts

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: plugin-release
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        files: artifacts/**
