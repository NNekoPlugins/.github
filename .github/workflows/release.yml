name: release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout-cone-mode: false   # ← CRITICAL FIX
          submodules: false

      - name: Show repo root contents
        run: dir

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: false

      - name: Verify SDK selection
        run: dotnet --version

      - name: Restore
        run: dotnet restore NNekoTriggers.csproj

      - name: Build Release
        run: dotnet build NNekoTriggers.csproj --configuration Release --no-restore

      - name: Publish Release Artifacts
        run: |
          mkdir publish
          copy bin\Release\* publish\

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NNekoTriggers-Release
          path: publish
