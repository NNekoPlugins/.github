name: build

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          submodules: false

      - name: Show repo root contents
        run: dir

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: false

      - name: Install DalamudPackager tool
        run: dotnet tool install --global DalamudPackager

      - name: Add NuGet feeds
        run: |
          dotnet nuget add source https://api.nuget.org/v3/index.json `
            --name nuget.org

          dotnet nuget add source https://pkgs.dev.azure.com/goatcorp/Dalamud/_packaging/Dalamud/nuget/v3/index.json `
            --name Dalamud `
            --store-password-in-clear-text `
            --username "user" `
            --password "pass"

          dotnet nuget add source https://pkgs.dev.azure.com/goatcorp/Dalamud/_packaging/DalamudSdk/nuget/v3/index.json `
            --name DalamudSdk `
            --store-password-in-clear-text `
            --username "user" `
            --password "pass"

      - name: Verify SDK selection
        run: dotnet --version

      - name: Restore
        run: dotnet restore NNekoTriggers.csproj

      - name: Build
        run: dotnet build NNekoTriggers.csproj --configuration Release --no-restore

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NNekoTriggers-Build
          path: bin/Release
