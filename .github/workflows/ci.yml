name: Org CI - Build Plugin

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string

jobs:
  build:
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (tag or pseudo)
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref.StartsWith("v")) {
            $ver = $ref.Substring(1)
          } else {
            $short = (git log -1 --format=%H).Substring(0,7)
            $ver = "0.0.0-ci.$short"
          }
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ${{ github.event.repository.name }}.csproj

      - name: Build Debug
        run: dotnet build ${{ github.event.repository.name }}.csproj --configuration Debug /p:GitVersion=${{ steps.version.outputs.version }}

      - name: Build Release
        run: dotnet build ${{ github.event.repository.name }}.csproj --configuration Release /p:GitVersion=${{ steps.version.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-build-${{ steps.version.outputs.version }}
          path: |
            **/bin/Debug/**
            **/bin/Release/**
