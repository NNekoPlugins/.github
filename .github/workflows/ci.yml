name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install DalamudPackager
      run: dotnet tool install --global DalamudPackager

    - name: Restore
      run: dotnet restore NNekoTriggers.csproj

    - name: Build
      run: dotnet build NNekoTriggers.csproj -c Release --no-restore

    - name: Package
      run: |
        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
        dalamudpackager pack -o artifacts

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NNekoTriggers
        path: artifacts
